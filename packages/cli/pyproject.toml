[project]
name = "grogbot-cli"
version = "0.1.0"
description = "Grogbot command line interface"
requires-python = ">=3.11"
dependencies = [
  "grogbot-search-core",
  "typer>=0.12",
]

[project.scripts]
grogbot = "grogbot_cli.app:app"

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grogbot_cli"]
