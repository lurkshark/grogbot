[project]
name = "grogbot-api"
version = "0.1.0"
description = "Grogbot FastAPI service"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110",
  "grogbot-search-core",
  "uvicorn>=0.29",
]

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grogbot_api"]
