{% extends "base.html" %}

{% block body %}
  <main class="page-shell page-shell--search">
    <section class="compact-panel compact-panel--search">
      <form class="search-form search-form--compact" action="/search/query" method="get">
        <label class="sr-only" for="search-query">Search query</label>
        <input
          id="search-query"
          class="search-input"
          type="text"
          name="q"
          value="{{ query }}"
          placeholder="Search Grogbot"
          autocomplete="off"
        />
        <button class="search-button" type="submit">Search</button>
      </form>
    </section>
  </main>
{% endblock %}
