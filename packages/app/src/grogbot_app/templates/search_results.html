{% extends "base.html" %}

{% block body %}
  <main class="page-shell page-shell--results">
    <header class="results-toolbar">
      <form class="search-form search-form--compact" action="/search/query" method="get">
        <label class="sr-only" for="results-query">Search query</label>
        <input
          id="results-query"
          class="search-input"
          type="text"
          name="q"
          value="{{ query }}"
          placeholder="Search Grogbot"
          autocomplete="off"
        />
        <button class="search-button" type="submit">Search</button>
      </form>
    </header>

    <section class="results-list" aria-label="Search results">
      {% if results %}
        {% for result in results %}
          <article class="search-result">
            <a class="search-result__url" href="{{ result.document.canonical_url }}">{{ result.document.canonical_url }}</a>
            <h2 class="search-result__title">
              <a href="{{ result.document.canonical_url }}">
                {{ result.document.title or result.document.canonical_url }}
              </a>
            </h2>
            <p class="search-result__snippet">{{ result.snippet_html }}</p>
          </article>
        {% endfor %}
      {% else %}
        <p class="empty-state">No results found.</p>
      {% endif %}
    </section>
  </main>
{% endblock %}
